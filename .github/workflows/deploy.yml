name: Deploy MCE Tools

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C "C:\MCE\GitHub\mce-tools" pull origin master

      - name: Switch to desktop-linux Docker context
        run: docker context use desktop-linux

      - name: Rebuild and restart MCE containers
        run: |
          cd C:\MCE\GitHub\mce-tools
          docker compose build --no-cache oe-toolkit mce-tools knowledge-engine
          docker compose up -d --force-recreate --no-deps oe-toolkit mce-tools knowledge-engine
          echo "Deploy complete"
