name: Deploy MCE Tools

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C "C:\MCE\GitHub\mce-tools" pull origin master

      - name: Rebuild and restart MCE containers
        run: |
          cd C:\MCE\GitHub\mce-tools
          try { docker stop mce-ingestion; docker rm mce-ingestion } catch { Write-Host "mce-ingestion not running, skipping" }
          docker compose build --no-cache oe-toolkit mce-workspace knowledge-engine
          docker compose up -d --force-recreate --no-deps oe-toolkit mce-workspace knowledge-engine nginx
          echo "Deploy complete"
