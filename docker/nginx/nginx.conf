# ============================================================
# MCE Suite — Nginx Reverse Proxy Configuration
# ============================================================
#
# PHASE 1 PLACEHOLDER
# This config serves a simple status page on port 80.
# It will be replaced in Phase 5 when all app containers
# are running and the full routing rules are configured.
#
# Final routing (Phase 5):
#   tools.maincharacter.wtf      → oe-toolkit:3000
#   sprocket.maincharacter.wtf   → sprocket:3000
#
# ============================================================

server {
    listen 80;
    server_name _;

    # Health check endpoint — used by cloudflared and monitoring
    location /health {
        access_log off;
        return 200 'MCE Suite infrastructure is up.\n';
        add_header Content-Type text/plain;
    }

    # Default — placeholder until app containers are added in Phase 5
    location / {
        return 200 'MCE Suite — Phase 1 infrastructure running. App containers coming soon.\n';
        add_header Content-Type text/plain;
    }
}
