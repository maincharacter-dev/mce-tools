# ============================================================
# MCE Suite — Nginx Reverse Proxy Configuration
# ============================================================
#
# Routing:
#   tools.maincharacter.wtf        → oe-toolkit:3000  (front door)
#   sprocket.maincharacter.wtf     → sprocket:3000
#   localhost:80                   → oe-toolkit:3000  (default)
#
# ============================================================

# ---- OE Toolkit (tools.maincharacter.wtf + localhost default) ----
server {
    listen 80;
    server_name tools.maincharacter.wtf localhost;

    # Health check endpoint — used by cloudflared and monitoring
    location /health {
        access_log off;
        return 200 'MCE Suite OK\n';
        add_header Content-Type text/plain;
    }

    # Proxy all traffic to OE Toolkit
    location / {
        proxy_pass http://oe-toolkit:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Allow large file uploads (matches app 250MB limit)
        client_max_body_size 260m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ---- Sprocket (sprocket.maincharacter.wtf) ----
server {
    listen 80;
    server_name sprocket.maincharacter.wtf;

    location / {
        proxy_pass http://sprocket:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 55m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
