# ============================================================
# MCE Suite — Nginx Reverse Proxy Configuration
# ============================================================
#
# Routing (all under toolkit.maincharacter.wtf):
#   /              → oe-toolkit:3000  (OE Toolkit front door)
#   /ta-tdd/       → mce-ingestion:3000  (TA/TDD Engine)
#   /knowledge/    → mce-knowledge-engine:8000  (Knowledge Engine API)
#
# Separate domain:
#   sprocket.maincharacter.wtf → sprocket:3000
#
# ============================================================

# ---- OE Toolkit (toolkit.maincharacter.wtf + localhost default) ----
server {
    listen 80;
    server_name toolkit.maincharacter.wtf tools.maincharacter.wtf localhost;

    # Health check endpoint — used by cloudflared and monitoring
    location /health {
        access_log off;
        return 200 'MCE Suite OK\n';
        add_header Content-Type text/plain;
    }

    # TA/TDD Engine — strip /ta-tdd prefix before forwarding
    location /ta-tdd/ {
        proxy_pass http://mce-ingestion:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 260m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Knowledge Engine API — strip /knowledge prefix before forwarding
    location /knowledge/ {
        proxy_pass http://mce-knowledge-engine:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # OE Toolkit — catch-all (must be last)
    location / {
        proxy_pass http://mce-oe-toolkit:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 260m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ---- Sprocket (sprocket.maincharacter.wtf) ----
server {
    listen 80;
    server_name sprocket.maincharacter.wtf;

    location / {
        proxy_pass http://mce-sprocket:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 55m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
