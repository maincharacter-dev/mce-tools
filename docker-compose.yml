# ============================================================
# MCE Suite — Unified Docker Compose
# ============================================================
#
# This is the root compose file for the entire MCE/OE/ACC tool suite.
# It lives in the mce-tools repo and is the single source of truth
# for the local Docker environment.
#
# Repositories included in this suite:
#   - mce-tools        (OE Toolkit + Ingestion Engine + Knowledge Engine)
#   - oe-ai-agent-2    (Sprocket AI Agent)
#   - acc-tools        (ACC Asset Extractor + Data Scraper + Site Inspection)
#
# Directory layout expected on the host machine:
#   C:\MCE\GitHub\
#   ├── mce-tools\          ← this repo (contains this file)
#   ├── oe-ai-agent-2\
#   └── acc-tools\
#
# Quick start:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker compose up -d
#   3. Open http://localhost:3000 (OE Toolkit)
#
# Remote access (Cloudflare Tunnel):
#   docker compose --profile tunnel up -d
#
# ============================================================
# PHASE 1 — Infrastructure layer only.
# Application containers (oe-toolkit, mce-tools, sprocket,
# acc-webapp, etc.) will be added in subsequent phases.
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL 8 — Primary relational database
  # Used by: OE Toolkit, MCE Ingestion Engine, Sprocket, ACC Webapp
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mce_main}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # init scripts create all schemas
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=300
      --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # PostgreSQL 15 — Secondary relational database
  # Used by: Knowledge Engine, ACC API (scraper/site-inspection)
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: mce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mce_postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d  # init scripts create all schemas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mce_user}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Neo4j 5 — Knowledge graph database
  # Used by: Sprocket (episodic memory, knowledge graph)
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: mce-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache__size: 256m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Redis 7 — Message broker and cache
  # Used by: ACC API (Celery task queue for scraping workers)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mce-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Replaces Manus Forge storage for all apps
  # Used by: OE Toolkit, MCE Ingestion Engine, Sprocket, ACC Tools
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Nginx — Reverse proxy / gateway
  # Routes external traffic to the correct app container.
  # tools.maincharacter.wtf  → oe-toolkit (added in Phase 5)
  # sprocket.maincharacter.wtf → sprocket  (added in Phase 5)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: mce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # depends_on will be expanded in Phase 5 when app containers are added
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Cloudflare Tunnel — Secure remote access (no open ports)
  # Activated with: docker compose --profile tunnel up -d
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env
  # ----------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mce-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - suite-network

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql-data:
    driver: local
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  suite-network:
    name: mce-suite-network
    driver: bridge
