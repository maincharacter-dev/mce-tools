# ============================================================
# MCE Suite — Unified Docker Compose
# ============================================================
#
# This is the root compose file for the entire MCE/OE/ACC tool suite.
# It lives in the mce-tools repo and is the single source of truth
# for the local Docker environment.
#
# Repositories included in this suite:
#   - mce-tools        (OE Toolkit + Ingestion Engine + Knowledge Engine)
#   - oe-ai-agent-2    (Sprocket AI Agent)
#   - acc-tools        (ACC Asset Extractor + Data Scraper + Site Inspection)
#
# Directory layout expected on the host machine:
#   C:\MCE\GitHub\
#   ├── mce-tools\          ← this repo (contains this file)
#   ├── oe-ai-agent-2\
#   └── acc-tools\
#
# Quick start:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker compose up -d
#   3. Open http://localhost:3000 (OE Toolkit)
#
# Remote access (Cloudflare Tunnel):
#   docker compose --profile tunnel up -d
#
# ============================================================
# PHASE 3 — Infrastructure + Application containers.
# Includes: OE Toolkit, MCE Ingestion Engine, Knowledge Engine, Sprocket.
# ACC Tools will be added in Phase 4.
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL 8 — Primary relational database
  # Used by: OE Toolkit, MCE Ingestion Engine, Sprocket, ACC Webapp
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mce_main}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d  # init scripts create all schemas on FIRST boot only
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=300
      --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # PostgreSQL 15 — Secondary relational database
  # Used by: Knowledge Engine, ACC API (scraper/site-inspection)
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: mce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mce_postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d  # init scripts create all schemas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mce_user} -d postgres"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Neo4j 5 — Knowledge graph database
  # Used by: Sprocket (episodic memory, knowledge graph)
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: mce-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Redis 7 — Message broker and cache
  # Used by: ACC API (Celery task queue for scraping workers)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mce-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - suite-network

  # ----------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Replaces Manus Forge storage for all apps
  # Used by: OE Toolkit, MCE Ingestion Engine, Sprocket, ACC Tools
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # OE Toolkit — Front-door app (oe-toolkit)
  # Access: http://localhost:3000 (local) or tools.maincharacter.wtf (remote)
  # Auth: LOCAL_AUTH=true — set OE_TOOLKIT_USERNAME and OE_TOOLKIT_PASSWORD in .env
  # ----------------------------------------------------------
  oe-toolkit:
    build:
      context: ./oe-toolkit
      dockerfile: Dockerfile
    container_name: mce-oe-toolkit
    restart: unless-stopped
    ports:
      - "${OE_TOOLKIT_PORT:-3002}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${OE_TOOLKIT_DATABASE:-oe_toolkit}
      JWT_SECRET: ${SHARED_JWT_SECRET}
      LOCAL_AUTH: "true"
      LOCAL_USERS: ${LOCAL_USERS:-}
      # Legacy single-user fallback (used only if LOCAL_USERS is not set)
      LOCAL_USERNAME: ${LOCAL_USERNAME:-}
      LOCAL_PASSWORD: ${LOCAL_PASSWORD:-}
      APS_CLIENT_ID: ${APS_CLIENT_ID:-}
      APS_CLIENT_SECRET: ${APS_CLIENT_SECRET:-}
      SPROCKET_URL: http://sprocket:3000
      SPROCKET_USERNAME: ${SPROCKET_USERNAME:-admin}
      SPROCKET_PASSWORD: ${SPROCKET_PASSWORD}
      MCE_WORKSPACE_URL: http://mce-workspace:3000
      MCE_WORKSPACE_DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MCE_WORKSPACE_DATABASE:-mce_workspace}
      KNOWLEDGE_ENGINE_URL: http://knowledge-engine:8000
    depends_on:
      mysql:
        condition: service_healthy
      sprocket:
        condition: service_healthy
      mce-workspace:
        condition: service_healthy
      knowledge-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/system.health?input=%7B%22json%22%3A%7B%22timestamp%22%3A0%7D%7D"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # MCE Workspace — Project workspace engine (mce-tools root)
  # Access: http://localhost:3001 (local)
  # Auth: LOCAL_AUTH=true — shared credentials via SHARED_JWT_SECRET
  # ----------------------------------------------------------
  mce-workspace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # VITE_ vars are baked into the client bundle at build time
        VITE_BASE_PATH: /workspace
        VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    container_name: mce-workspace
    restart: unless-stopped
    ports:
      - "${MCE_WORKSPACE_PORT:-3001}:3000"
    volumes:
      - mce-workspace-data:/app/data
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MCE_WORKSPACE_DATABASE:-mce_workspace}
      JWT_SECRET: ${SHARED_JWT_SECRET}
      LOCAL_AUTH: "true"
      LOCAL_USERS: ${LOCAL_USERS:-}
      # Legacy single-user fallback (used only if LOCAL_USERS is not set)
      LOCAL_USERNAME: ${LOCAL_USERNAME:-}
      LOCAL_PASSWORD: ${LOCAL_PASSWORD:-}
      APS_CLIENT_ID: ${APS_CLIENT_ID:-}
      APS_CLIENT_SECRET: ${APS_CLIENT_SECRET:-}
      BASE_PATH: /workspace
      # AI / LLM — provide OPENAI_API_KEY for OpenAI (gpt-4o-mini)
      # leave blank to fall back to the built-in Forge API
      OPENAI_API_KEY: ${MCE_WORKSPACE_OPENAI_API_KEY:-}
      # Ollama (optional local LLM — used only when OPENAI_API_KEY is blank)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Document storage directory inside the container
      DATA_DIR: /app/data
      # Sprocket URL — for centralised LLM usage reporting
      SPROCKET_URL: http://sprocket:3000
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/system.health?input=%7B%22json%22%3A%7B%22timestamp%22%3A0%7D%7D"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # MCE Knowledge Engine — Python FastAPI service
  # Access: http://localhost:8000 (local)
  # ----------------------------------------------------------
  knowledge-engine:
    build:
      context: ./knowledge-engine
      dockerfile: Dockerfile
    container_name: mce-knowledge-engine
    restart: unless-stopped
    ports:
      - "${KNOWLEDGE_ENGINE_PORT:-8000}:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mce_user}:${POSTGRES_PASSWORD}@postgres:5432/${KNOWLEDGE_ENGINE_DATABASE:-knowledge_engine}
      OPENAI_API_KEY: ${KNOWLEDGE_ENGINE_OPENAI_API_KEY:-}
      PINECONE_API_KEY: ${KNOWLEDGE_ENGINE_PINECONE_API_KEY:-}
      PINECONE_INDEX: ${KNOWLEDGE_ENGINE_PINECONE_INDEX:-mce-knowledge}
      # Sprocket URL — for centralised LLM usage reporting
      SPROCKET_URL: http://sprocket:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Sprocket — AI Agent (oe-ai-agent-2)
  # Access: http://localhost:3010 (local) or sprocket.maincharacter.wtf (remote)
  # Auth: LOCAL_AUTH=true — set SPROCKET_USERNAME and SPROCKET_PASSWORD in .env
  # ----------------------------------------------------------
  sprocket:
    build:
      context: ../oe-ai-agent-2
      dockerfile: Dockerfile
    container_name: mce-sprocket
    restart: unless-stopped
    ports:
      - "${SPROCKET_PORT:-3010}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-agent}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-agent_chat}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: "true"
      STORAGE_DIR: /app/storage-data
      WORKSPACE_DIR: /app/workspace
      VENV_DIR: /app/agent-venv
      JWT_SECRET: ${SPROCKET_JWT_SECRET}
      LOCAL_AUTH: "true"
      LOCAL_USERNAME: ${SPROCKET_USERNAME:-admin}
      LOCAL_PASSWORD: ${SPROCKET_PASSWORD}
      OPENAI_API_KEY: ${SPROCKET_OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${SPROCKET_ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${SPROCKET_GOOGLE_API_KEY}
    volumes:
      - sprocket-storage:/app/storage-data
      - sprocket-workspace:/app/workspace
      - sprocket-venv:/app/agent-venv
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trpc/auth.me"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Nginx — Reverse proxy / gateway
  # Routes external traffic to the correct app container.
  # tools.maincharacter.wtf  → oe-toolkit (added in Phase 5)
  # sprocket.maincharacter.wtf → sprocket  (added in Phase 5)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: mce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - oe-toolkit
      - mce-workspace
      - sprocket
    networks:
      - suite-network

  # ----------------------------------------------------------
  # Cloudflare Tunnel — Secure remote access (no open ports)
  # Activated with: docker compose --profile tunnel up -d
  # Requires CLOUDFLARE_TUNNEL_TOKEN in .env
  # ----------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mce-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - suite-network

# ============================================================
# Volumes
# ============================================================
#
# mysql-data and neo4j-* are declared as EXTERNAL so that Docker
# attaches to the existing oe-ai-agent-2 volumes that contain
# Sprocket's live database and knowledge graph data.
#
# All other volumes are managed by this compose file.
# ============================================================
volumes:
  # Existing Sprocket data — DO NOT recreate
  mysql-data:
    external: true
    name: oe-ai-agent-2_mysql-data
  neo4j-data:
    external: true
    name: oe-ai-agent-2_neo4j-data
  neo4j-logs:
    external: true
    name: oe-ai-agent-2_neo4j-logs
  # Sprocket app data (storage, workspace, python venv)
  sprocket-storage:
    external: true
    name: oe-ai-agent-2_storage-data
  sprocket-workspace:
    external: true
    name: oe-ai-agent-2_workspace-data
  sprocket-venv:
    external: true
    name: oe-ai-agent-2_venv-data
  # New suite volumes
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  mce-workspace-data:
    driver: local
# ============================================================
# Networks
# ============================================================
networks:
  suite-network:
    name: mce-suite-network
    driver: bridge
